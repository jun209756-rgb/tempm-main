name = "temp-mail-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "de8881aaf8b43035044e40b43b1f1508"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "temp-mail-db"
